<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>StyleSnap AI</title>
    <script>
      // GitHub Pages SPA fallback (rafgraph technique).
      // Encodes the deep-link path into a query string and redirects to the
      // app root; index.html restores it via history.replaceState.
      // pathSegmentsToKeep = 1 keeps the /<repo>/ base on project pages.
      (function () {
        var pathSegmentsToKeep = 1
        var l = window.location
        l.replace(
          l.protocol +
            '//' +
            l.hostname +
            (l.port ? ':' + l.port : '') +
            l.pathname
              .split('/')
              .slice(0, 1 + pathSegmentsToKeep)
              .join('/') +
            '/?/' +
            l.pathname
              .slice(1)
              .split('/')
              .slice(pathSegmentsToKeep)
              .join('/')
              .replace(/&/g, '~and~') +
            (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
            l.hash,
        )
      })()
    </script>
  </head>
  <body></body>
</html>
